# set leader key
set -g prefix C-a

# set leader r to refresh config
unbind r
bind-key r source-file ~/.config/tmux/.tmux.conf \; display-message "tmux.conf reloaded."

# mouse mode
set -g mouse on

# ==========================
# General Settings
# ==========================

# Set prefix to Ctrl-a (easier to reach than Ctrl-b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Massive scrollback history (Essential for reading long server logs)
set -g history-limit 100000

# Start windows and panes at 1, not 0 (faster keyboard targeting)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows automatically when one is closed
set -g renumber-windows on

# Zero delay for escape key (prevents weird characters when using Vim/Nano)
set -s escape-time 0

# Display tmux messages for 4 seconds instead of 1
set -g display-time 4000

# Enable mouse support (scrolling logs, resizing panes)
set -g mouse on

# Set terminal colors safely for remote environments
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ==========================
# Keybindings
# ==========================

# Reload config instantly
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."

# Window splits (using your preferred v/h keys)
bind-key v split-window -h -c "#{pane_current_path}"
bind-key h split-window -v -c "#{pane_current_path}"

# Smart pane switching with awareness of Vim (The Unified HJKL Pattern)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Switch windows using Shift-Arrow (No prefix needed)
bind -n S-Left previous-window
bind -n S-Right next-window

# ==========================
# The "God Mode" Toggle
# ==========================

# Synchronize panes: Type the same command in all visible panes simultaneously!
# Perfect for updating multiple servers or checking logs across a cluster.
bind-key y set-window-option synchronize-panes \; display-message "Pane Synchronization: #{?pane_synchronized,ON,OFF}"

# ==========================
# Copy Mode (Vim Style)
# ==========================

setw -g mode-keys vi
bind Escape copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind p paste-buffer

# ==========================
# Visuals & Status Bar
# ==========================

# Native, zero-dependency status bar optimized for server awareness
set -g status-position top
set -g status-style bg=default,fg=white
set -g status-interval 5

# Left side: Session name
set -g status-left-length 40
set -g status-left "#[fg=green,bold][#S] "

# Center: Window list (Highlight active window clearly)
set -g window-status-format " #I:#W#F "
set -g window-status-current-format "#[bg=blue,fg=black,bold] #I:#W#F "

# Right side: Hostname (CRITICAL so you don't reboot the wrong server) and Time
# Also displays a bright red [SYNC] warning if pane synchronization is active
set -g status-right-length 60
set -g status-right "#{?pane_synchronized,#[bg=red]#[fg=white]#[bold] SYNC ON #[default] ,}#[fg=cyan,bold]#H #[fg=white]| %H:%M "

# Highlight active pane border so you always know where you are typing
set -g pane-active-border-style fg=blue

