# ┃                             tmux.conf                                     ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# --------------------------------------------------
# Reload config
# --------------------------------------------------
unbind r
bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded."

# --------------------------------------------------
# Set leader key
# --------------------------------------------------
set -g prefix C-Space

# Unbind the old prefix (optional but recommended)
unbind C-b

# Allow sending <leader> to other programs by pressing it twice
bind C-Space send-prefix


# --------------------------------------------------
# Configure tmux
# --------------------------------------------------
set -g mouse on
set -g default-terminal "tmux-256color"
set -g terminal-overrides ',xterm-256color:RGB'
set -g status-style 'bg=terminal'
set -g base-index 1              # start indexing windows at 1 instead of 0
set -g status-position top       # position
set -g set-clipboard on          # use system clipboard
set -g status-justify "absolute-centre"
set -g renumber-windows on      # renumber all windows when one closes
set -g allow-passthrough on     # image passthrough

# don't rename windows automatically
#set-option -g allow-rename off

# --------------------------------------------------
# Navigation
# --------------------------------------------------
bind -n C-h select-pane -L
bind -n C-l select-pane -R
bind -n C-k select-pane -U
bind -n C-j select-pane -D

# window splits
bind-key v split-window -h
bind-key h split-window -v
# Split panes using | and -
bind | split-window -h
bind - split-window -v

# Unbind the clunky default keys
unbind '"'
unbind %

# switch windows
bind -n S-Left previous-window
bind -n S-Right next-window

# synchronize panes
bind-key y set-window-option synchronize-panes \; display-message "synchonize mode toggled"

# in normal tmux mode
bind Escape copy-mode # `tmux prefix + Escape` starts copy mode.
bind p paste-buffer # `prefix + p` pastes the latest buffer

# --------------------------------------------------
# MISC
# --------------------------------------------------

# To install plugins must do "<leader> I" from within a session
# prefix + i <lower_case> will reclone tmp
# Force reinstall TPM and plugins
bind I run-shell "rm -rf ~/.tmux/plugins/tpm && \
                  git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && \
                  ~/.tmux/plugins/tpm/bin/install_plugins" \; display-message "TPM reinstalled and plugins updated!"

# in copy mode…
# bind -t vi-copy v begin-selection # `v` begins a selection. (movement keys to select the desired bits)
# bind -t vi-copy y copy-selection # `y` copies the current selection to one of tmux's "paste buffers"
# bind -t vi-copy V rectangle-toggle # `V` changes between line- and columnwise selection
#
# bind -t vi-copy Y copy-end-of-line # ^1
# bind + delete-buffer

# Press prefix + ? to open a searchable popup of all keybindings
bind-key ? display-popup -w 80% -h 80% -E "tmux list-keys | fzf --prompt='Tmux Keys > ' --layout=reverse --border"

# --------------------------------------------------
# List of plugins
# --------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'mrjones2014/smart-splits.nvim'

#
# mrjones2014/smart-splits.nvim
#
set -g @smart-splits_no_wrap '' # to disable wrapping. (any value disables wrapping)

set -g @smart-splits_move_left_key  'C-h' # key-mapping for navigation.
set -g @smart-splits_move_down_key  'C-j' #  --"--
set -g @smart-splits_move_up_key    'C-k' #  --"--
set -g @smart-splits_move_right_key 'C-l' #  --"--

#set -g @smart-splits_resize_left_key  'M-h' # key-mapping for resizing.
#set -g @smart-splits_resize_down_key  'M-j' #  --"--
#set -g @smart-splits_resize_up_key    'M-k' #  --"--
#set -g @smart-splits_resize_right_key 'M-l' #  --"--

set -g @smart-splits_resize_step_size '3' # change the step-size for resizing.

#-------------------------------------------------------
# Undercurl
#-------------------------------------------------------
set -g default-terminal "${TERM}"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

#-------------------------------------------------------
# Theme
#-------------------------------------------------------
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background 'none'
set -g @catppuccin_window_status_style "none"

set -g @catppuccin_session_color "#{@thm_mauve}"
set -g @catppuccin_directory_color "#{@thm_lavender}"
set -g @catppuccin_uptime_color "#{@thm_pink}"
set -g @catppuccin_date_time_color "#{@thm_yellow}"

set -g @catppuccin_directory_icon " "
set -g @catppuccin_session_icon " "

# online status
set -g @online_icon "ok"
set -g @offline_icon "nok"

#-------------------------------------------------------
# Left Status
#-------------------------------------------------------
set -g status-left-length 120
set -g status-left "#{E:@catppuccin_status_session}"

#-------------------------------------------------------
# Right Status
#-------------------------------------------------------
set -g status-right-length 160
# set -g status-right "#{E:@catppuccin_status_application}"
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

#-------------------------------------------------------
# Status
#-------------------------------------------------------
set -g @catppuccin_status_connect_separator "no" # yes, no
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_right_separator " "
# set -g @catppuccin_status_middle_separator ""

#-------------------------------------------------------
# window look and feel
#-------------------------------------------------------
set -wg automatic-rename on
set -g automatic-rename-format "Window"
set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=default,fg=#{@thm_sapphire},bold"
set -g window-status-last-style "bg=default,fg=#{@thm_blue},bold"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=default,fg=#{@thm_overlay_0},bold]│"
set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@thm_sky},fg=#{@thm_bg},bold"

#-------------------------------------------------------
# pane border look and feel
#-------------------------------------------------------
setw -g pane-border-status top
setw -g pane-border-format ""
setw -g pane-active-border-style "bg=#{@thm_bg},fg=#{@thm_overlay_0}"
setw -g pane-border-style "bg=#{@thm_bg},fg=#{@thm_surface_0}"
setw -g pane-border-lines single

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
