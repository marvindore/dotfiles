format = """
$directory\
$git_branch\
$git_status\
$fill\
$dotnet\
$java\
$python\
$lua\
$nodejs\
$golang\
$rust\
$package\
$aws\
$docker_context\
$jobs\
$cmd_duration\
$line_break\
$character"""

add_newline = true
palette = 'catppuccin_macchiato'
command_timeout = 1000

[directory]
style = 'bold fg:blue'
format = '[$path ]($style)'
truncate_to_repo = true

[directory.substitutions]
'Documents' = '¾░łÖ'
'Downloads' = '’ĆÖ '
'Music' = '’Ćü '
'Pictures' = '’ĆŠ '

[git_branch]
style = 'fg:green'
symbol = '’Éś '
format = '[on](white) [$symbol$branch ]($style)'

[git_status]
style = 'fg:peach'
ahead = 'ŌćĪ${count}'
behind = 'ŌćŻ${count}'
diverged = 'ŌćĢ'
staged = 'Ō£Ü'
modified = '’æä'    # A simple dot is often easier to read than a complex icon
untracked = '?'
deleted = 'Ō£¢'
conflicted = '’ü▒ CONFLICT'
style_conflicted = 'bold fg:red'
# Conflict (Urgent) -> Staged/Modified (Work in progress) -> Ahead/Behind (Sync status)
format = '([$conflicted](bold red) [$staged$modified$deleted$untracked]($style) [$ahead_behind](fg:purple) )'

[character]
success_symbol = '[ŌØ»](bold green)'
error_symbol = '[ŌØ»](bold red)'
[fill]
symbol = ' '

[python]
style = 'teal'
symbol = 'ŅłĄ '
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv active\) )]($style)'
pyenv_version_name = true
pyenv_prefix = ''

[dotnet]
symbol = 'ŅØ┐ '

[java]
symbol = 'Ņ£Ė '

[lua]
symbol = 'ŅśĀ '

[nodejs]
style = 'blue'
symbol = 'Ņ£ś '

[golang]
style = 'blue'
symbol = 'Ņś¦ '

[haskell]
style = 'blue'
symbol = 'ŅØĘ '

[rust]
style = 'orange'
symbol = 'Ņ×© '

[ruby]
style = 'blue'
symbol = 'Ņ×æ '

[package]
symbol = '¾░ÅŚ '

[aws]
symbol = '’ē░ '
style = 'yellow'
format = '[$symbol($profile )(\[$duration\] )]($style)'

[docker_context]
symbol = '’īł '
style = 'fg:#06969A'
format = '[$symbol]($style) $path'
detect_files = ['docker-compose.yml', 'docker-compose.yaml', 'Dockerfile']
detect_extensions = ['Dockerfile']

[jobs]
symbol = '’Ćō '
style = 'red'
number_threshold = 1
format = '[$symbol]($style)'

[cmd_duration]
min_time = 2000 # Only show if the command takes longer than 2 seconds
style = 'fg:gray'
format = 'took [$duration]($style)'

